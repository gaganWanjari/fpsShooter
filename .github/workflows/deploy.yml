name: Deploy to GitHub Pages

on:
  # Run on every push to the main branch.
  push:
    branches: [main]
  # Allow running manually from the Actions tab.
  workflow_dispatch:

# Permissions needed to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        # Serve from /<repo>/ so asset URLs resolve on the project page.
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
